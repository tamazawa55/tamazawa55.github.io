<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tamazawa</title>

  <link rel="icon"
    href="https://gamepedia.cursecdn.com/minecraft_gamepedia/a/a7/Heart.svg?version=dac1a46352ab4c25ad78a3cef0ceea86"
    type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Poppins", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a, #262626);
      color: #f5f5f5;
      cursor: pointer;
    }

    .orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(60px);
      opacity: 0.4;
      pointer-events: none;
      z-index: 1;
    }

    .orb-1 {
      width: 260px; height: 260px;
      background: #444;
      top: -80px; left: -80px;
      animation: float1 14s infinite alternate ease-in-out;
    }

    .orb-2 {
      width: 230px; height: 230px;
      background: #888;
      bottom: -80px; right: -80px;
      animation: float2 16s infinite alternate ease-in-out;
    }

    @keyframes float1 {
      from { transform: translate(0,0);}
      to {transform: translate(40px,70px);}
    }

    @keyframes float2 {
      from { transform: translate(0,0);}
      to {transform: translate(-60px,-40px);}
    }

    .wrapper {
      position: relative;
      z-index: 5;
      width: 100%;
      max-width: 460px;
      padding: 24px 16px;
    }

    .card {
      background: rgba(20,20,20,0.85);
      backdrop-filter: blur(20px);
      border-radius: 26px;
      padding: 26px 22px 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.9);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .avatar {
      width: 86px; height: 86px;
      border-radius: 999px;
      margin: 0 auto 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fff, #aaa);
      padding: 3px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.8);
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      object-fit: cover;
      filter: grayscale(100%);
    }

    .name {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .bio {
      text-align: center;
      margin-top: 6px;
      opacity: .7;
      font-size: .9rem;
    }

    .divider {
      margin: 18px auto 16px;
      width: 70%;
      height: 1px;
      background: linear-gradient(to right, transparent, #555, transparent);
    }

    .game-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .game-card {
      background: linear-gradient(135deg, #2b2b2b, #3a3a3a);
      padding: 11px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      color: #f5f5f5;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s ease;
    }

    .game-card:hover {
      transform: translateY(-3px);
      background: linear-gradient(135deg, #444, #555);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 22px;
    }

    .link-btn {
      background: linear-gradient(135deg, #e5e5e5, #bdbdbd);
      color: #111;
      padding: 12px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s ease;
    }

    .link-btn:hover {
      transform: translateY(-3px);
      filter: brightness(1.05);
    }

    .footer-note {
      margin-top: 20px;
      font-size: 0.75rem;
      opacity: .5;
      text-align: center;
    }

    .footer-note span {
      font-weight: 600;
      color: #fff;
    }

    @media (max-width: 480px) {
      .game-strip {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <audio id="bg-music" autoplay loop muted preload="auto">
    <source src="last-shot.mp3" type="audio/mp3">
  </audio>

  <script>
    const audio = document.getElementById("bg-music");
    audio.volume = 0.2;

    window.addEventListener("load", () => {
      audio.play().catch(() => {});
    });

    function enableSoundOnce() {
      audio.muted = false;
      if (audio.paused) audio.play().catch(() => {});
      document.removeEventListener("click", enableSoundOnce);
    }
    document.addEventListener("click", enableSoundOnce);
  </script>

  <div class="wrapper">
    <div class="card">

      <div class="avatar">
        <img src="https://yt3.ggpht.com/FhihPZYHZ8HiPWAyfQ9Lnt-bJmO1JEQMMY39R98qO_COICIBmR0bmJTmY-rxvNL5-7FDDbmc=s600-c-k-c0x00ffffff-no-rj-rp-mo" alt="Tamazawa Avatar">
      </div>

      <div class="name">Tamazawa</div>
      <div class="bio">Streamer Roblox | Valorant | Content Creator</div>

      <div class="divider"></div>

      <div class="game-strip">
        <a href="https://www.roblox.com/users/6048191003/profile" class="game-card" target="_blank">
          ROBLOX Profile →
        </a>

        <a href="https://tracker.gg/valorant/profile/riot/ironmeng%23zzz" class="game-card" target="_blank">
          Valorant Stats →
        </a>
      </div>

      <div class="links">
        <a href="https://saweria.co/tamazawa" class="link-btn" target="_blank">
          <span>Saweria</span>
          <span>Support</span>
        </a>

        <a href="https://sociabuzz.com/tamazawa/donate" class="link-btn" target="_blank">
          <span>Sociabuzz</span>
          <span>Donate</span>
        </a>

        <a href="https://www.youtube.com/@tamazawaa" class="link-btn" target="_blank">
          <span>YouTube</span>
          <span>Subscribe</span>
        </a>

        <a href="https://www.tiktok.com/@thankspull_" class="link-btn" target="_blank">
          <span>TikTok</span>
          <span>Follow</span>
        </a>
      </div>

      <div class="footer-note">
        Made for <span>@tamazawa</span>
      </div>

    </div>
  </div>

</body>
</html>
