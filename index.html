<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: "Poppins", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    color: #fff;

    /* BACKGROUND BARU */
    background:
      linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.55)),
      url("https://images5.alphacoders.com/121/1212123.jpg")
      center/cover no-repeat fixed;
  }

  .orb {
    position: fixed;
    border-radius: 999px;
    filter: blur(50px);
    opacity: 0.55;
    pointer-events: none;
    z-index: 1;
  }

  .orb-1 {
    width: 260px;
    height: 260px;
    background: #ff4655;
    top: -80px;
    left: -80px;
    animation: float1 14s infinite alternate ease-in-out;
  }

  .orb-2 {
    width: 230px;
    height: 230px;
    background: #00f0ff;
    bottom: -80px;
    right: -80px;
    animation: float2 16s infinite alternate ease-in-out;
  }

  @keyframes float1 {
    from {
      transform: translate(0,0);
    }
    to {
      transform: translate(40px,70px);
    }
  }

  @keyframes float2 {
    from {
      transform: translate(0,0);
    }
    to {
      transform: translate(-60px,-40px);
    }
  }

  .wrapper {
    position: relative;
    z-index: 5;
    width: 100%;
    max-width: 460px;
    padding: 24px 16px;
  }

  .card {
    background:
      linear-gradient(
        135deg,
        rgba(255,255,255,0.14),
        rgba(15,15,15,0.92)
      );

    backdrop-filter: blur(18px);

    border-radius: 28px;
    padding: 26px 22px 24px;

    border: 1px solid rgba(255,255,255,0.15);

    box-shadow:
      0 20px 50px rgba(0,0,0,0.85),
      0 0 35px rgba(255,70,85,0.18);

    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";

    position: absolute;
    inset: 0;

    border-radius: inherit;

    background:
      linear-gradient(
        135deg,
        rgba(255,255,255,0.12),
        transparent 40%,
        rgba(255,255,255,0.03)
      );

    opacity: 0.8;
  }

  .card-inner {
    position: relative;
    z-index: 2;
  }

  .avatar {
    width: 88px;
    height: 88px;

    border-radius: 999px;

    margin: 0 auto 10px;

    display: flex;
    justify-content: center;
    align-items: center;

    padding: 3px;

    background:
      linear-gradient(
        135deg,
        #ff4655,
        #00f0ff
      );

    box-shadow:
      0 0 20px rgba(255,70,85,0.5),
      0 0 30px rgba(0,240,255,0.3);

    overflow: hidden;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    border-radius: 999px;
    object-fit: cover;
  }

  .name {
    text-align: center;
    font-size: 1.45rem;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .bio {
    text-align: center;
    margin-top: 6px;
    opacity: 0.85;
    font-size: 0.9rem;
  }

  .divider {
    margin: 18px auto 16px;
    width: 70%;
    height: 1px;

    background:
      linear-gradient(
        to right,
        transparent,
        rgba(255,255,255,0.8),
        transparent
      );
  }

  .game-strip {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  @keyframes neonPulse {
    0% {
      box-shadow:
        0 0 10px rgba(255,70,85,0.25),
        0 0 18px rgba(0,240,255,0.15);
    }

    50% {
      box-shadow:
        0 0 18px rgba(255,70,85,0.65),
        0 0 30px rgba(0,240,255,0.45);
    }

    100% {
      box-shadow:
        0 0 12px rgba(255,70,85,0.35),
        0 0 22px rgba(0,240,255,0.25);
    }
  }

  .game-card {
    background:
      linear-gradient(
        135deg,
        rgba(255,70,85,0.22),
        rgba(15,15,15,0.9)
      );

    padding: 11px 14px;

    border-radius: 999px;

    border: 1px solid rgba(255,255,255,0.18);

    color: #fff;
    text-decoration: none;

    font-size: 0.82rem;
    font-weight: 500;

    display: flex;
    justify-content: space-between;
    align-items: center;

    backdrop-filter: blur(10px);

    transition: 0.18s ease;

    animation: neonPulse 3s infinite alternate;
  }

  .game-card:hover {
    transform: translateY(-3px) scale(1.02);
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 22px;
  }

  .link-btn {
    background:
      linear-gradient(
        135deg,
        rgba(255,255,255,0.95),
        rgba(255,255,255,0.82)
      );

    color: #111;

    padding: 12px 16px;

    border-radius: 999px;

    text-decoration: none;

    font-weight: 600;

    display: flex;
    justify-content: space-between;
    align-items: center;

    border: 1px solid rgba(255,255,255,0.15);

    transition: 0.18s ease;

    animation: neonPulse 3.2s infinite alternate;
  }

  .link-btn:hover {
    transform: translateY(-3px) scale(1.02);

    filter: brightness(1.04);
  }

  .footer-note {
    margin-top: 20px;
    font-size: 0.75rem;
    opacity: 0.75;
    text-align: center;
  }

  .footer-note span {
    font-weight: 600;
    color: #fff;
  }

  @media (max-width: 480px) {
    .wrapper {
      padding-inline: 14px;
    }

    .card {
      padding-inline: 18px;
    }

    .game-strip {
      grid-template-columns: 1fr;
    }
  }
</style>
